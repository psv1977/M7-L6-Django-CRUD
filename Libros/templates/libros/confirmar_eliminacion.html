{% extends "libros/base.html" %}

{% block content %}
<h2>Eliminar libro</h2>

<p>¿Estás seguro de que deseas eliminar el libro "{{ libro.titulo }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>

<br>

<a href="{% url 'listar_libros' %}">Cancelar</a>
{% endblock %}
