{% extends "libros/base.html" %}

{% block content %}

{% if libro %}
    <h2>Editar libro</h2>
{% else %}
    <h2>Crear libro</h2>
{% endif %}

<form method="post">
    {% csrf_token %}

    <label for="titulo">Título:</label>
    <input type="text" name="titulo" id="titulo" value="{{ libro.titulo|default:'' }}" required>

    <br><br>

    <label for="autor">Autor:</label>
    <input type="text" name="autor" id="autor" value="{{ libro.autor|default:'' }}" required>

    <br><br>

    <label for="anio">Año:</label>
    <input type="number" name="anio" id="anio" value="{{ libro.anio|default:'' }}" required>

    <br><br>

    <button type="submit">Guardar</button>
</form>

{% endblock %}
